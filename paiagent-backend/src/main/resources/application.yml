server:
  port: 8080

spring:
  application:
    name: paiagent-backend

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/paiagentOwn?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: pai
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# LLM Provider configurations
paiagent:
  llm:
    openai:
      base-url: https://api.openai.com/v1
      api-key: ${OPENAI_API_KEY:}
      default-model: gpt-4o-mini
    deepseek:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:}
      default-model: deepseek-chat
    tongyi:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${TONGYI_API_KEY:}
      default-model: qwen-max
